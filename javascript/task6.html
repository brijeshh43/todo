
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> To Do List</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.glass{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.2);
}

.completed{
text-decoration: line-through;
opacity:0.6;
}

</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="glass p-8 rounded-3xl shadow-2xl w-[420px]">

<h1 class="text-3xl font-bold text-center mb-6 tracking-wide">
✨  To Do List
</h1>

<div class="flex gap-2 mb-6">

<input
id="taskInput"
type="text"
placeholder="Add new task..."
class="flex-1 px-4 py-2 rounded-xl text-black outline-none"
/>

<button
onclick="addTask()"
class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded-xl transition duration-300 shadow-lg">
Add
</button>

</div>

<ul id="taskList" class="space-y-3"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks))
}

function renderTasks(){

const taskList = document.getElementById("taskList")
taskList.innerHTML = ""

tasks.forEach((task,index)=>{

const li = document.createElement("li")

li.className =
"flex justify-between items-center bg-white/20 px-4 py-3 rounded-xl hover:bg-white/30 transition"

li.innerHTML = `
<span onclick="toggleTask(${index})"
class="cursor-pointer ${task.completed ? 'completed':''}">
${task.text}
</span>

<button onclick="deleteTask(${index})"
class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded-lg text-sm">
Delete
</button>
`

taskList.appendChild(li)

})

}

function addTask(){

const input = document.getElementById("taskInput")
const text = input.value.trim()

if(text==="") return

tasks.push({text:text,completed:false})

input.value=""

saveTasks()
renderTasks()

}

function deleteTask(index){

tasks.splice(index,1)

saveTasks()
renderTasks()

}

function toggleTask(index){

tasks[index].completed = !tasks[index].completed

saveTasks()
renderTasks()

}

renderTasks()

</script>

</body>
</html>
