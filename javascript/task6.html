<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    h2 {
      color: #333;
    }

    input {
      padding: 10px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-right: 10px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #45a049;
    }

    ul {
      list-style-type: none;
      padding: 0;
      width: 300px;
      margin-top: 20px;
    }

    li {
      background: #fff;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
    }

    li:hover {
      transform: scale(1.02);
      background: #f0f0f0;
    }

    li.done {
      text-decoration: line-through;
      color: gray;
      background: #e0e0e0;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: darkred;
    }
  </style>
</head>
<body>
  <h2>My To-Do List</h2>
  <input type="text" id="taskInput" placeholder="Enter a task">
  <button id="addTask">Add Task</button>
  <button id="viewTasks">View Tasks</button>

  <ul id="taskList"></ul>

  <script>
    const input = document.getElementById("taskInput");
    const addBtn = document.getElementById("addTask");
    const viewBtn = document.getElementById("viewTasks");
    const taskList = document.getElementById("taskList");

    // Load tasks from localStorage
    window.onload = function() {
      const savedTasks = JSON.parse(localStorage.getItem("tasks")) || [];
      savedTasks.forEach(text => createTask(text));
    };

    // Add new task
    addBtn.addEventListener("click", () => {
      const taskText = input.value.trim();
      if (taskText === "") return;
      createTask(taskText);
      saveTasks();
      input.value = "";
    });

    // Create task element
    function createTask(taskText) {
      const li = document.createElement("li");
      li.textContent = taskText;

      // Toggle done
      li.addEventListener("click", () => {
        li.classList.toggle("done");
        saveTasks();
      });

      // Delete button
      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "❌";
      deleteBtn.classList.add("delete-btn");
      deleteBtn.addEventListener("click", (e) => {
        e.stopPropagation(); // prevent toggling done
        li.remove();
        saveTasks();
      });

      li.appendChild(deleteBtn);
      taskList.appendChild(li);
    }

    // View tasks in console
    viewBtn.addEventListener("click", () => {
      const tasks = Array.from(taskList.children).map(li => li.textContent.replace("❌", "").trim());
      console.log("Tasks:", tasks);
    });

    // Save tasks to localStorage
    function saveTasks() {
      const tasks = Array.from(taskList.children).map(li => li.textContent.replace("❌", "").trim());
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }
  </script>
</body>
</html>
